<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🎯 QR Code Generator</h1>
        <p class="subtitle">Create custom QR codes with optional logo</p>
        
        <div class="form-container">
            <form id="qrForm">
                <div class="form-group">
                    <label for="qrData">Enter URL or Text:</label>
                    <input 
                        type="text" 
                        id="qrData" 
                        placeholder="https://example.com" 
                        required
                        autocomplete="off"
                    >
                </div>
                
                <div class="form-group">
                    <label for="logoFile">Upload Logo (Optional):</label>
                    <input 
                        type="file" 
                        id="logoFile" 
                        accept="image/*"
                    >
                    <small>Recommended: PNG with transparency</small>
                </div>
                
                <button type="submit" id="generateBtn">
                    <span id="btnText">Generate QR Code</span>
                    <span id="btnLoader" class="loader" style="display: none;"></span>
                </button>
            </form>
        </div>
        
        <div id="result" class="result" style="display: none;">
            <h2>Your QR Code</h2>
            <div class="qr-container">
                <img id="qrImage" alt="Generated QR Code">
            </div>
            <button id="downloadBtn" class="download-btn">Download QR Code</button>
        </div>
        
        <div id="error" class="error" style="display: none;"></div>
    </div>
    
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
